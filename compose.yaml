name: local

services:
  nginx:
    image: nginx:1.28-alpine
    container_name: local-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/nginx-health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - local

  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local-php
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_URL: http://omtbiz.test
      DB_HOST: mysql
      DB_PORT: 3306
      PASSPORT_KEYS_PATH: /run/passport
    volumes:
      - ./:/var/www/html
    tmpfs:
      - /run/passport:mode=0700
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - local

  mysql:
    image: mysql:8.4
    container_name: local-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - local

  dnsmasq:
    build:
      context: ./docker/dnsmasq
    container_name: local-dnsmasq
    restart: unless-stopped
    ports:
      - "127.0.0.1:53:53/tcp"
      - "127.0.0.1:53:53/udp"
    healthcheck:
      test: ["CMD", "nslookup", "omtbiz.test", "127.0.0.1"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - local

networks:
  local:
    name: local

volumes:
  mysql_data:
    name: local-mysql-data
